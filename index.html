<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個別運動処方システム | からだカルテ診断</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        mono: ['"Roboto Mono"', 'monospace']
                    },
                    colors: {
                        primary: '#2563eb',
                        primaryDark: '#1d4ed8',
                        accent: '#f59e0b',
                        surface: '#f8fafc'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #e2e8f0; }
        .fade-enter { opacity: 0; transform: translateY(20px) scale(0.98); }
        .fade-enter-active { opacity: 1; transform: translateY(0) scale(1); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-exit-active { opacity: 0; transform: translateY(-20px) scale(0.98); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .choice-btn { transition: all 0.2s ease; border: 2px solid transparent; }
        .choice-btn:hover { border-color: #2563eb; background-color: #eff6ff; transform: translateX(5px); }
        
        .prescription-paper {
            background: #fff;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1);
        }
        .stamp {
            display: inline-block;
            padding: 0.25rem 1rem;
            border: 3px solid #ef4444;
            color: #ef4444;
            font-weight: 900;
            font-size: 1.25rem;
            border-radius: 0.5rem;
            transform: rotate(-15deg);
            opacity: 0;
            animation: stampAnim 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s forwards;
        }
        @keyframes stampAnim {
            0% { opacity: 0; transform: scale(2) rotate(-15deg); }
            100% { opacity: 0.8; transform: scale(1) rotate(-15deg); }
        }
        .pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); } 50% { opacity: .9; transform: scale(1.02); box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); } }
    </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center p-2 sm:p-4 text-gray-800">

    <div id="app" class="w-full min-h-[95vh] sm:min-h-[85vh] max-w-5xl bg-white rounded-2xl sm:rounded-3xl shadow-2xl flex flex-col relative overflow-hidden">
        
        <div id="progress-container" class="hidden w-full bg-gray-100 h-2 absolute top-0 left-0 z-10">
            <div id="progress-bar" class="bg-primary h-2 transition-all duration-500 w-0"></div>
        </div>

        <div id="content" class="flex-1 flex flex-col w-full p-5 md:p-12 overflow-y-auto">
            </div>

    </div>

    <script>
        // --- データ定義 ---
        let userProfile = { age: '', gender: '', height: '', weight: '', habit: '' };
        let currentQuestion = 0;
        let scores = { body: 0, stamina: 0, mind: 0 };

        // エビデンス（サルコペニア・ロコモ・認知機能スクリーニング）に基づく12問
        const questions = [
            { text: "手すりや机に手をつかずに、椅子から立ち上がることがスムーズにできる。", axis: "body", desc: "下肢筋力・バランス" },
            { text: "青信号のうちに、横断歩道を余裕を持って渡りきることができる。", axis: "body", desc: "歩行能力（移動速度）" },
            { text: "ペットボトルのキャップを開けたり、重い引き出しを引く動作に苦労しない。", axis: "body", desc: "上肢筋力・握力目安" },
            { text: "ここ1〜2年の間で、身長が2cm以上縮んだということはない。", axis: "body", desc: "骨密度・姿勢の関連" },
            { text: "平らな道を自分のペースで15分以上続けて歩いても、息が苦しくなることはない。", axis: "stamina", desc: "有酸素運動の耐性" },
            { text: "階段を2階分（20〜30段）上ったあと、呼吸の乱れは1〜2分以内に落ち着く。", axis: "stamina", desc: "心肺機能の回復力" },
            { text: "布団の上げ下ろしや、部屋全体の掃除機がけなどの家事で強い息切れはしない。", axis: "stamina", desc: "日常の活動量・労作性" },
            { text: "少し遠くのスーパーや施設まで、乗り物を使わず歩いて行こうと思える体力の余裕がある。", axis: "stamina", desc: "スタミナの自覚・予備能" },
            { text: "昨日食べたもののメニューや、数日前の出来事をスムーズに思い出すことができる。", axis: "mind", desc: "エピソード記憶" },
            { text: "テレビの音が鳴っているような環境でも、本を読んだり人の話を集中して理解できる。", axis: "mind", desc: "注意力・脳の選別能" },
            { text: "今日が何曜日か、あるいは今年が何年かを、一瞬迷うことなくパッと答えられる。", axis: "mind", desc: "時間・場所の見当識" },
            { text: "人から頼まれた3つ以上の買い物リストを、メモを見ずに記憶して買い揃えることができる。", axis: "mind", desc: "短期記憶・記銘力" }
        ];

        const resultsData = {
            "HAC": { title: "トライアスリート", subtitle: "文武両道、タフで聡明な完全無欠タイプ",
                feature: "筋肉・骨・スタミナのすべてが揃い、頭脳も明晰。ハードな状況にも対応できる「鉄人」です。",
                menu: { mon: "高強度インターバル(HIIT)", tue: "アクティブレスト(ヨガ)", wed: "ウェイトトレーニング", thu: "休息日", fri: "新しいスポーツに挑戦", sat: "長距離ランニング", sun: "全身ストレッチ" },
                advice: "現状の身体能力は非常に高いレベルにあります。更なる向上のため、使ったことのない筋肉を刺激する新しい競技への挑戦をおすすめします。"
            },
            "HAN": { title: "ラグビーフォワード", subtitle: "スタミナとパワーで突き進む切り込み隊長",
                feature: "体力と突進力は群を抜いていますが、細かいことは気にしないおおらかな気質を持ちます。",
                menu: { mon: "有酸素運動(ジョギング)", tue: "筋力トレーニング(体幹)", wed: "休息日", thu: "ステップ運動/エアロビ", fri: "アクティブレスト", sat: "チームスポーツ参加", sun: "脳トレ＋軽い散歩" },
                advice: "身体のタフさは素晴らしいですが、脳の疲労感に気づきにくい傾向があります。複雑な動きを伴う運動で脳に心地よい刺激を与えましょう。"
            },
            "HRC": { title: "スプリンター", subtitle: "一瞬の爆発力と鋭い戦術で魅せるパワー型",
                feature: "筋肉の出力が高く頭の回転も速いですが、持久力は長続きしにくいため、短時間で勝負をかけるタイプです。",
                menu: { mon: "ダッシュ＆ウォーク", tue: "上半身ウェイト", wed: "完全休息日", thu: "下半身ウェイト", fri: "短時間スイミング", sat: "趣味のアクティビティ", sun: "入念なストレッチ" },
                advice: "長時間のダラダラとした運動はストレスになります。「短時間で追い込み、しっかり休む」というメリハリのついたサイクルが最適です。"
            },
            "HRN": { title: "ウエイトリフター", subtitle: "無理せず一撃にかける省エネパワー",
                feature: "骨格や筋力は頑丈ですが、息が上がる運動は苦手。普段は穏やかな省エネモードです。",
                menu: { mon: "自体重スクワット", tue: "軽いウォーキング", wed: "休息日", thu: "タオルストレッチ", fri: "ラジオ体操", sat: "軽めの筋力トレ", sun: "リラックスヨガ" },
                advice: "基礎的な力は十分に備わっています。まずは心肺機能に負担をかけすぎない、ゆっくりとしたペースの全身運動から習慣化しましょう。"
            },
            "SAC": { title: "ミッドフィルダー", subtitle: "抜群のスタミナでスマートに立ち回る司令塔",
                feature: "体型は華奢ですがスタミナが抜群にあり、広い視野とフットワークの軽さが持ち味です。",
                menu: { mon: "プッシュアップ＆腹筋", tue: "ロングジョギング", wed: "アクティブレスト", thu: "下半身強化(ランジ)", fri: "サイクリング", sat: "体幹トレーニング", sun: "休息・マッサージ" },
                advice: "持久力と頭の回転の速さは完璧です。怪我を防ぐため、筋肉量と骨密度を高める「抗重力トレーニング」を多めに取り入れましょう。"
            },
            "SAN": { title: "ダンサー", subtitle: "リズム感抜群、楽しく動き回るリフレッシュ派",
                feature: "筋力は控えめですが、スタミナがあり動くのが大好き。のびのびと身体を動かすのが得意です。",
                menu: { mon: "ダンス・エアロビクス", tue: "ウォーキング", wed: "休息日", thu: "音楽に合わせて家事", fri: "ピラティス", sat: "ハイキング", sun: "ゆっくり入浴・柔軟" },
                advice: "「辛いトレーニング」よりも「楽しいアクティビティ」が向いています。音楽を取り入れ、モチベーションを維持しながら基礎体力を養いましょう。"
            },
            "SRC": { title: "ゴルファー", subtitle: "緻密な計算と集中力で勝負する精密機械",
                feature: "体力勝負より、冷静な分析力と高い集中力で効率よく身体をコントロールする知性派です。",
                menu: { mon: "デスクワーク合間ストレッチ", tue: "1回5分のプチ筋トレ", wed: "姿勢改善エクササイズ", thu: "休息日", fri: "ウォーキング", sat: "バランスボール", sun: "マインドフルネス瞑想" },
                advice: "頭脳労働による首や肩の緊張が懸念されます。激しい運動ではなく、姿勢を正し、血流を改善するためのこまめなストレッチが処方箋となります。"
            },
            "SRN": { title: "ウォーカー", subtitle: "心地よさを最優先する無理のない脱力系",
                feature: "激しいスポーツは苦手。お散歩感覚でゆったり心地よく身体を動かすのが合っているマイペース派。",
                menu: { mon: "深呼吸と朝ののび", tue: "近所を10分お散歩", wed: "休息日", thu: "湯船にゆっくり浸かる", fri: "寝る前の軽い柔軟", sat: "お出かけ（買い物等）", sun: "完全リラックス" },
                advice: "今は「運動」と構える必要はありません。まずは日常生活の中で「少し歩く」「深く呼吸する」といった超低負荷な習慣から身体を慣らしましょう。"
            }
        };

        const contentDiv = document.getElementById('content');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');

        function render(html, callback) {
            contentDiv.classList.add('fade-exit-active');
            setTimeout(() => {
                contentDiv.innerHTML = html;
                contentDiv.classList.remove('fade-exit-active');
                contentDiv.classList.add('fade-enter-active');
                if(callback) callback();
                setTimeout(() => { contentDiv.classList.remove('fade-enter-active'); }, 500);
            }, 400);
        }

        function renderStart() {
            progressContainer.classList.add('hidden');
            const html = `
                <div class="m-auto text-center max-w-2xl">
                    <span class="inline-block py-1 px-3 rounded-full bg-blue-100 text-primary text-sm font-bold tracking-widest mb-6">PHYSICAL & MIND ANALYSIS</span>
                    <h1 class="text-3xl md:text-5xl font-black text-gray-900 mb-6 leading-tight tracking-tight">
                        からだカルテ診断<br><span class="text-primary">個別運動処方</span>システム
                    </h1>
                    <p class="text-gray-500 mb-10 text-base md:text-lg leading-relaxed">
                        12個の科学的質問と基本情報から、あなたの「筋骨格・心肺・認知機能」を多角的に分析。<br class="hidden md:block">
                        8つの身体タイプ分類に基づく、<b>あなただけの詳細な運動処方箋</b>を即座に発行します。
                    </p>
                    <button onclick="renderProfile()" class="group relative inline-flex items-center justify-center w-full md:w-auto px-12 py-5 text-lg font-bold text-white transition-all duration-200 bg-primary rounded-full hover:bg-primaryDark hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
                        分析をはじめる
                        <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </div>
            `;
            render(html);
        }

        function renderProfile() {
            const html = `
                <div class="m-auto w-full max-w-xl">
                    <div class="mb-8 text-center">
                        <h2 class="text-2xl font-bold text-gray-900">基本情報の入力</h2>
                        <p class="text-gray-500 text-sm mt-2">より正確な処方箋とBMI分析を行うために使用します。</p>
                    </div>
                    <form id="profileForm" onsubmit="submitProfile(event)" class="space-y-6 bg-surface p-6 md:p-8 rounded-2xl border border-gray-100 shadow-sm">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">年齢</label>
                                <div class="relative">
                                    <input type="number" id="p_age" required min="18" max="120" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-lg" placeholder="例: 55">
                                    <span class="absolute right-4 top-3.5 text-gray-400">歳</span>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">性別</label>
                                <select id="p_gender" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-lg bg-white">
                                    <option value="">選択...</option>
                                    <option value="男性">男性</option>
                                    <option value="女性">女性</option>
                                    <option value="その他">その他/回答しない</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">身長</label>
                                <div class="relative">
                                    <input type="number" id="p_height" required min="100" max="250" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-lg" placeholder="例: 165">
                                    <span class="absolute right-4 top-3.5 text-gray-400">cm</span>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">体重</label>
                                <div class="relative">
                                    <input type="number" id="p_weight" required min="30" max="200" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-lg" placeholder="例: 60">
                                    <span class="absolute right-4 top-3.5 text-gray-400">kg</span>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">現在の運動習慣</label>
                            <select id="p_habit" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-lg bg-white">
                                <option value="">選択してください</option>
                                <option value="全くなし">全くなし</option>
                                <option value="週1〜2回">週1〜2回程度</option>
                                <option value="週3回以上">週3回以上</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-xl shadow-md transition-colors text-lg mt-4">
                            診断へ進む
                        </button>
                    </form>
                </div>
            `;
            render(html);
        }

        function submitProfile(e) {
            e.preventDefault();
            userProfile.age = parseInt(document.getElementById('p_age').value);
            userProfile.gender = document.getElementById('p_gender').value;
            userProfile.height = parseFloat(document.getElementById('p_height').value);
            userProfile.weight = parseFloat(document.getElementById('p_weight').value);
            userProfile.habit = document.getElementById('p_habit').value;
            
            currentQuestion = 0;
            scores = { body: 0, stamina: 0, mind: 0 };
            progressContainer.classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;
            progressBar.style.width = `${progress}%`;

            const html = `
                <div class="m-auto w-full max-w-2xl flex flex-col justify-center min-h-[50vh]">
                    <div class="mb-8">
                        <div class="flex justify-between items-end mb-4">
                            <span class="text-primary font-black text-2xl">Q${currentQuestion + 1}<span class="text-gray-400 text-lg"> / ${questions.length}</span></span>
                            <span class="text-xs font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-full">${q.desc}</span>
                        </div>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800 leading-relaxed">${q.text}</h2>
                    </div>
                    
                    <div class="space-y-3">
                        ${[
                            {val: 5, text: "非常に当てはまる", color: "bg-blue-50"},
                            {val: 4, text: "やや当てはまる", color: "bg-white"},
                            {val: 3, text: "どちらともいえない", color: "bg-white"},
                            {val: 2, text: "あまり当てはまらない", color: "bg-white"},
                            {val: 1, text: "全く当てはまらない", color: "bg-gray-50"}
                        ].map(opt => `
                            <button onclick="answerQuestion(${opt.val}, '${q.axis}')" class="choice-btn w-full text-left px-5 py-4 rounded-2xl text-gray-700 font-bold ${opt.color} shadow-sm flex items-center justify-between text-base md:text-lg border border-gray-200 group">
                                <span>${opt.text}</span>
                                <div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center group-hover:border-primary group-hover:bg-primary transition-colors"></div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            render(html);
        }

        function answerQuestion(val, axis) {
            scores[axis] += val;
            currentQuestion++;
            if (currentQuestion < questions.length) {
                renderQuestion();
            } else {
                progressBar.style.width = '100%';
                renderLoading();
            }
        }

        function renderLoading() {
            progressContainer.classList.add('hidden');
            const html = `
                <div class="m-auto text-center">
                    <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-primary mb-6"></div>
                    <h2 id="loadingText" class="text-2xl font-bold text-gray-800">データを解析中...</h2>
                    <p class="text-gray-500 mt-2">12項目のデータから「からだカルテ」を生成しています</p>
                </div>
            `;
            render(html, () => {
                setTimeout(() => { document.getElementById('loadingText').innerText = "個別メニューを生成中..."; }, 1200);
                setTimeout(() => { document.getElementById('loadingText').innerText = "処方箋を発行中..."; }, 2400);
                setTimeout(renderDelivery, 3600);
            });
        }

        function renderDelivery() {
            const html = `
                <div class="m-auto text-center">
                    <div class="inline-flex items-center justify-center w-32 h-32 mb-8 bg-blue-50 text-primary rounded-full border-4 border-blue-100 pulse-slow cursor-pointer group shadow-inner" onclick="calculateResult()">
                        <svg class="w-16 h-16 group-hover:scale-110 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <h2 class="text-3xl font-black text-gray-900 mb-4">処方箋が届きました！</h2>
                    <p class="text-gray-500 mb-8">AIによる分析が完了し、あなた専用の<br>「からだカルテ運動処方箋」が発行されました。</p>
                    <button onclick="calculateResult()" class="px-10 py-4 bg-primary text-white font-bold rounded-full text-lg shadow-lg hover:bg-primaryDark hover:scale-105 transition-all">
                        処方箋を開封する
                    </button>
                </div>
            `;
            render(html);
        }

        function calculateResult() {
            let bonus = 0;
            if (userProfile.habit === "週1〜2回") bonus = 2;
            if (userProfile.habit === "週3回以上") bonus = 4;

            // 低運動層でもきれいに分岐するように調整
            const bodyType = (scores.body + bonus) >= 11 ? 'H' : 'S';
            const staminaType = (scores.stamina + bonus) >= 11 ? 'A' : 'R';
