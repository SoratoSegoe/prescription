<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>運動タイプ診断</title>
<style>
:root {
  --paper: #e7ebe7;
  --card: #fbfcfb;
  --card-2: #f1f4f1;
  --line: #d4dad4;
  --line-strong: #b6bfb6;
  --ink: #172019;
  --ink-2: #445049;
  --ink-3: #7c867f;
  --vital: #1f6f50;
  --vital-deep: #15543c;
  --vital-soft: #e3efe9;
  --signal: #d8593b;
  --axis-body: #b07a2e;
  --axis-stamina: #1f6f50;
  --axis-mind: #5b5ba6;
  --r: 14px;
  --r-sm: 9px;
  --shadow: 0 18px 50px -24px rgba(23,32,25,.45);
  --shadow-sm: 0 2px 10px -4px rgba(23,32,25,.25);
  --ease: cubic-bezier(.4, 0, .2, 1);
}
* { box-sizing: border-box; }
body {
  margin: 0; padding: 20px;
  font-family: system-ui, -apple-system, sans-serif;
  color: var(--ink); background: var(--paper);
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
}
.app {
  position: relative; width: 100%; max-width: 800px; min-height: 600px;
  background: var(--card); border: 1px solid var(--line); border-radius: var(--r);
  box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden;
}
.trace { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--line); }
.trace__fill { height: 100%; width: 0%; background: var(--vital); transition: width 0.3s ease; }
.stage { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
.hero { text-align: center; max-width: 600px; margin: 0 auto; }
.hero h1 { font-size: 2.2rem; margin-bottom: 20px; color: var(--ink); }
.hero p { color: var(--ink-2); line-height: 1.8; margin-bottom: 30px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 15px 40px; background: var(--vital); color: white; border: none;
  border-radius: 999px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
  transition: background 0.2s; text-decoration: none;
}
.btn:hover { background: var(--vital-deep); }
.btn-ghost { background: transparent; color: var(--ink-2); border: 2px solid var(--line-strong); margin-top: 20px;}
.btn-ghost:hover { background: var(--card-2); }
.form-head { text-align: center; margin-bottom: 30px; }
.card { background: var(--card-2); border: 1px solid var(--line); border-radius: var(--r); padding: 30px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field label { font-size: 0.9rem; font-weight: bold; color: var(--ink-2); }
.field input, .field select {
  padding: 12px; border: 1px solid var(--line-strong); border-radius: var(--r-sm);
  font-size: 1rem; background: var(--card); color: var(--ink); width: 100%;
}
.q-top { display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--ink-3); font-size: 0.9rem; }
.q-text { font-size: 1.5rem; line-height: 1.6; margin-bottom: 40px; text-align: center; }
.scale-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 30px; }
.opt-btn {
  flex: 1; padding: 15px 10px; border: 2px solid var(--line-strong); background: var(--card);
  border-radius: var(--r-sm); cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: all 0.2s;
}
.opt-btn:hover { border-color: var(--vital); background: var(--vital-soft); }
.analyze { text-align: center; }
.spinner { width: 50px; height: 50px; border: 5px solid var(--line); border-top-color: var(--vital); border-radius: 50%; animation: spin 1s linear infinite; margin: 30px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.report-sheet { border: 1px solid var(--line); border-radius: var(--r); background: white; overflow: hidden; }
.report-head { padding: 30px; border-bottom: 2px solid var(--ink); display: flex; justify-content: space-between; align-items: center; }
.p-box { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--line); gap: 1px; border-bottom: 1px solid var(--line); }
.p-box div { background: var(--card-2); padding: 15px; text-align: center; }
.p-box .k { font-size: 0.75rem; color: var(--ink-3); }
.p-box .v { font-size: 1.1rem; font-weight: bold; margin-top: 5px; }
