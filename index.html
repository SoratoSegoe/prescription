        }

        function submitProfile(e) {
            e.preventDefault();
            userProfile.age = parseInt(document.getElementById('p_age').value);
            userProfile.gender = document.getElementById('p_gender').value;
            userProfile.height = parseFloat(document.getElementById('p_height').value);
            userProfile.weight = parseFloat(document.getElementById('p_weight').value);
            userProfile.habit = document.getElementById('p_habit').value;
            
            currentQuestion = 0;
            scores = { body: 0, stamina: 0, mind: 0 };
            progressContainer.classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;
            progressBar.style.width = `${progress}%`;

            const html = `
                <div class="w-full max-w-2xl mx-auto flex flex-col justify-center min-h-[50vh] py-4">
                    <div class="mb-8">
                        <div class="flex justify-between items-end mb-4">
                            <span class="text-primary font-black text-2xl">Q${currentQuestion + 1}<span class="text-gray-400 text-lg"> / ${questions.length}</span></span>
                            <span class="text-xs font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-full">${q.desc}</span>
                        </div>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800 leading-relaxed">${q.text}</h2>
                    </div>
                    
                    <div class="space-y-3">
                        ${[
                            {val: 5, text: "非常に当てはまる", color: "bg-blue-50"},
                            {val: 4, text: "やや当てはまる", color: "bg-white"},
                            {val: 3, text: "どちらともいえない", color: "bg-white"},
                            {val: 2, text: "あまり当てはまらない", color: "bg-white"},
                            {val: 1, text: "全く当てはまらない", color: "bg-gray-50"}
                        ].map(opt => `
                            <button onclick="answerQuestion(${opt.val}, '${q.axis}')" class="choice-btn w-full text-left px-5 py-4 rounded-2xl text-gray-700 font-bold ${opt.color} shadow-sm flex items-center justify-between text-base md:text-lg border border-gray-200 group">
                                <span>${opt.text}</span>
                                <div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center group-hover:border-primary group-hover:bg-primary transition-colors"></div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            render(html);
        }

        function answerQuestion(val, axis) {
            scores[axis] += val;
            currentQuestion++;
            if (currentQuestion < questions.length) {
                renderQuestion();
            } else {
                progressBar.style.width = '100%';
                renderLoading();
            }
        }

        function renderLoading() {
            progressContainer.classList.add('hidden');
            const html = `
                <div class="text-center py-12 mx-auto">
                    <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-primary mb-6"></div>
                    <h2 id="loadingText" class="text-2xl font-bold text-gray-800">データを解析中...</h2>
                    <p class="text-gray-500 mt-2">12項目のデータから「からだカルテ」を生成しています</p>
                </div>
            `;
            render(html, () => {
                setTimeout(() => { document.getElementById('loadingText').innerText = "個別メニューを生成中..."; }, 1200);
                setTimeout(() => { document.getElementById('loadingText').innerText = "からだカルテを作成中..."; }, 2400);
                setTimeout(renderDelivery, 3600);
            });
        }

        function renderDelivery() {
            const html = `
                <div class="text-center py-8 mx-auto">
                    <div class="inline-flex items-center justify-center w-32 h-32 mb-8 bg-blue-50 text-primary rounded-full border-4 border-blue-100 pulse-slow cursor-pointer group shadow-inner" onclick="calculateResult()">
                        <svg class="w-16 h-16 group-hover:scale-110 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <h2 class="text-3xl font-black text-gray-900 mb-4">からだカルテが完成しました！</h2>
                    <p class="text-gray-500 mb-8">AIによる分析が完了し、あなた専用の<br>「からだカルテ運動プログラム案内」が発行されました。</p>
                    <button onclick="calculateResult()" class="px-10 py-4 bg-primary text-white font-bold rounded-full text-lg shadow-lg hover:bg-primaryDark hover:scale-105 transition-all">
                        カルテを確認する
                    </button>
                </div>
            `;
            render(html);
        }

        function calculateResult() {
            let bonus = 0;
            if (userProfile.habit === "週1〜2回") bonus = 2;
            if (userProfile.habit === "週3回以上") bonus = 4;

            const bodyType = (scores.body + bonus) >= 11 ? 'H' : 'S';
            const staminaType = (scores.stamina + bonus) >= 11 ? 'A' : 'R';
            const mindType = scores.mind >= 11 ? 'C' : 'N';
            
            const resultKey = `${bodyType}${staminaType}${mindType}`;
            renderPrescription(resultKey);
        }

        function renderPrescription(key) {
            const data = resultsData[key] || resultsData["SRN"];
            const heightM = userProfile.height / 100;
            const bmi = parseFloat((userProfile.weight / (heightM * heightM)).toFixed(1));
            const dateStr = new Date().toLocaleDateString('ja-JP');

            let bmiMin = 18.5;
            let bmiMax = 24.9;
            if (userProfile.age >= 50 && userProfile.age <= 64) {
                bmiMin = 20.0;
            } else if (userProfile.age >= 65 && userProfile.age <= 74) {
                bmiMin = 21.5;
            } else if (userProfile.age >= 75) {
                bmiMin = 21.5;
                bmiMax = 25.5;
            }

            const minRange = 14;
            const maxRange = 30;
            let bmiPos = ((bmi - minRange) / (maxRange - minRange)) * 100;
            if(bmiPos < 0) bmiPos = 0;
            if(bmiPos > 100) bmiPos = 100;

            const targetLeft = ((bmiMin - minRange) / (maxRange - minRange)) * 100;
            const targetWidth = ((bmiMax - bmiMin) / (maxRange - minRange)) * 100;

            let bmiStatusText = "目標範囲内（適正）";
            let bmiTextColor = "text-green-600";
            if (bmi < bmiMin) {
                bmiStatusText = "目標以下（低体重·筋肉量減少に注意）";
                bmiTextColor = "text-amber-500";
            } else if (bmi > bmiMax) {
                bmiStatusText = "目標以上（過体重·生活習慣に注意）";
                bmiTextColor = "text-red-500";
            }

            const html = `
                <div class="max-w-4xl w-full mx-auto py-2">
                    <div class="prescription-paper border border-gray-200 rounded-lg p-4 md:p-10 relative overflow-hidden text-gray-800">
                        
                        <div class="border-b-4 border-gray-800 pb-4 mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-2">
                            <div>
                                <h1 class="text-2xl md:text-4xl font-black tracking-widest text-gray-900">からだカルテ診断結果</h1>
                                <p class="font-mono text-gray-500 text-xs md:text-sm mt-1">PERSONAL EXERCISE REPORT</p>
                            </div>
                            <div class="text-left sm:text-right w-full sm:w-auto">
                                <p class="font-mono text-xs md:text-sm text-gray-600">発行日: ${dateStr}</p>
                                <p class="font-mono text-xs md:text-sm text-gray-600">ID: ${Math.floor(Math.random() * 10000000).toString().padStart(8, '0')}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 md:grid-cols-5 gap-2 md:gap-4 mb-6 bg-surface p-4 rounded-lg border border-gray-200 text-center sm:text-left">
                            <div><p class="text-xs text-gray-500 font-bold">年齢</p><p class="text-base md:text-lg font-mono font-bold">${userProfile.age}<span class="text-sm">歳</span></p></div>
                            <div><p class="text-xs text-gray-500 font-bold">性別</p><p class="text-base md:text-lg font-bold">${userProfile.gender}</p></div>
                            <div><p class="text-xs text-gray-500 font-bold">身長</p><p class="text-base md:text-lg font-mono font-bold">${userProfile.height}<span class="text-sm">cm</span></p></div>
                            <div><p class="text-xs text-gray-500 font-bold">体重</p><p class="text-base md:text-lg font-mono font-bold">${userProfile.weight}<span class="text-sm">kg</span></p></div>
                            <div class="col-span-3 md:col-span-1"><p class="text-xs text-gray-500 font-bold">あなたの現在のBMI</p><p class="text-base md:text-lg font-mono font-bold text-primary">${bmi}</p></div>
                        </div>

                        <div class="mb-8 bg-surface p-4 rounded-lg border border-gray-200">
                            <div class="flex justify-between items-center mb-2">
                                <h4 class="text-xs font-bold text-gray-700">■ 厚労省ガイドラインに基づく年齢別·目標BMI分析</h4>
                                <span class="text-xs font-bold ${bmiTextColor}">${bmiStatusText}</span>
                            </div>
                            <div class="relative w-full bg-gray-200 h-6 rounded-full overflow-visible mb-2">
                                <div class="absolute h-6 bg-green-500 bg-opacity-40" style="left: ${targetLeft}%; width: ${targetWidth}%;"></div>
                                <div class="absolute w-1.5 h-8 bg-blue-600 rounded-full top-1/2 -translate-y-1/2 z-10 shadow" style="left: calc(${bmiPos}% - 3px);">
                                    <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[10px] font-mono px-1.5 py-0.5 rounded shadow whitespace-nowrap">現在値: ${bmi}</div>
                                </div>
                            </div>
                            <div class="flex justify-between text-[10px] text-gray-400 font-mono px-1">
                                <span>14 (やせ)</span>
                                <span style="margin-left: calc(${targetLeft}% - 20px)">目標下限: ${bmiMin}</span>
                                <span style="margin-right: calc(${(100 - targetLeft - targetWidth)}% - 20px)">目標上限: ${bmiMax}</span>
                                <span>30 (肥満)</span>
                            </div>
                            <p class="text-[11px] text-gray-500 mt-2 leading-relaxed">※厚生労働省「日本人の食事摂取基準」に準拠。中年期以降はフレイル·筋肉量減少リスクを予防するため、年齢とともに適切なBMIの下限値が引き上げられます。</p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                            <div>
                                <h3 class="text-xs font-bold text-gray-400 mb-2 border-b border-gray-300 pb-1">■ あなたの身体特性タイプ</h3>
                                <p class="text-xs md:text-sm font-bold text-primary mb-1">${data.subtitle}</p>
                                <h2 class="text-xl md:text-2xl font-black mb-4 text-gray-900">${data.title}</h2>
                                <p class="text-sm leading-relaxed text-gray-700 mb-4">${data.feature}</p>
                                
                                <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                                    <h4 class="text-xs font-bold text-gray-800 mb-1">💡 なぜこのタイプ判定になったのか？（根拠）</h4>
                                    <p class="text-xs text-gray-600 leading-relaxed">${data.reason}</p>
                                </div>
                            </div>
                            <div class="space-y-4 pt-4 md:pt-0">
                                <h3 class="text-xs font-bold text-gray-400 mb-2 border-b border-gray-300 pb-1">■ 3大機能の現在値</h3>
                                <div>
                                    <div class="flex justify-between text-xs font-bold mb-1"><span class="text-gray-600">骨格筋 (からだの力強さ·立ち上がり能力)</span><span class="font-mono">${scores.body}/20</span></div>
                                    <div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-blue-600 h-2 rounded-full" style="width: ${(scores.body/20)*100}%"></div></div>
                                </div>
                                <div>
                                    <div class="flex justify-between text-xs font-bold mb-1"><span class="text-gray-600">心肺機能 (スタミナ·日常の息切れしにくさ)</span><span class="font-mono">${scores.stamina}/20</span></div>
                                    <div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-green-500 h-2 rounded-full" style="width: ${(scores.stamina/20)*100}%"></div></div>
                                </div>
                                <div>
                                    <div class="flex justify-between text-xs font-bold mb-1"><span class="text-gray-600">認知機能 (脳の冴え·注意力·記憶の引き出し)</span><span class="font-mono">${scores.mind}/20</span></div>
                                    <div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-purple-500 h-2 rounded-full" style="width: ${(scores.mind/20)*100}%"></div></div>
                                </div>
                            </div>
                        </div>

                        <h3 class="text-xs font-bold text-gray-400 mb-4 border-b border-gray-300 pb-1">■ あなたに的確に組まれた1週間の運動ガイド</h3>
                        <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-2 mb-8">
                            ${Object.entries({月:'mon',火:'tue',水:'wed',木:'thu',金:'fri',土:'sat',日:'sun'}).map(([day, key]) => `
                                <div class="border border-gray-200 rounded p-2 text-center bg-white shadow-sm">
                                    <div class="text-xs font-bold text-gray-500 mb-1 border-b pb-1">${day}</div>
                                    <div class="text-[11px] font-bold text-gray-800 leading-tight min-h-[32px] flex items-center justify-center">${data.menu[key]}</div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="relative bg-blue-50 border border-blue-100 p-4 md:p-6 rounded-lg">
                            <h3 class="text-xs md:text-sm font-bold text-primary mb-2">■ 今後のアクションアドバイス</h3>
                            <p class="text-xs md:text-sm text-gray-800 leading-relaxed font-medium mb-4 sm:mb-0">${data.advice}</p>
                            <div class="static sm:absolute bottom-4 right-4 text-right sm:text-left"><span class="stamp">分析完了</span></div>
                        </div>

                    </div>

                    <div class="mt-8 bg-emerald-50 border border-emerald-100 p-6 rounded-2xl shadow-sm text-center max-w-2xl m-auto">
                        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 mb-3">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                        <h4 class="text-emerald-900 font-bold text-base mb-1">からだを動かし、まいにちを豊かに。</h4>
                        <p class="text-emerald-700 text-xs md:text-sm leading-relaxed mb-4">
                            現在、皆様の日々の生活が、無理のない運動をきっかけに豊かで活力あるものになるよう、一人ひとりに寄り添う個別サポートサービスを準備中です。準備が整い次第、こちらのLINE公式アカウントより最優先でご案内いたします。どうぞ楽しみにお待ちください！
                        </p>
                        <div class="flex flex-col sm:flex-row gap-3 justify-center">
                            <div class="bg-gray-400 text-white font-bold py-3 px-8 rounded-xl text-sm flex items-center justify-center cursor-not-allowed opacity-80">
                                プレミアム配信サービス準備中
                            </div>
                            <button onclick="renderStart()" class="bg-white border border-gray-300 text-gray-600 font-bold py-3 px-6 rounded-xl text-sm hover:bg-gray-50 transition-colors">
                                最初からやり直す
                            </button>
                        </div>
                    </div>

                </div>
            `;
            render(html);
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderStart();
        });
    </script>
</body>
</html>
